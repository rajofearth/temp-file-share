# Mars-1.0 DPO (Ornith-lite week 6)
# UltraFeedback + coding preferences — fixes verbosity, format for agent harnesses
# Liquid DPO: lr 5e-7, beta 0.1, LoRA recommended

project_name: mars_dpo
model_id: LiquidAI/LFM2.5-8B-A1B

previous_stage:
  stage: sft
  project_name: mars_sft_code

dataset:
  seed: 42
  # limit: 2000
  sources:
    - name: ultrafeedback
      path: HuggingFaceH4/ultrafeedback_binarized
      split: train_prefs
      weight: 0.70

    - name: codefeedback
      path: HuggingFaceH4/codefeedback-filtered
      split: train
      weight: 0.30

peft:
  enabled: false

training:
  num_train_epochs: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 5.0e-7
  beta: 0.1
  max_length: 4096
  max_prompt_length: 2048
  gradient_checkpointing: true
  save_steps: 200
  save_total_limit: 3

modal:
  gpu: A10G
  timeout_hours: 14
  volume: mars-train-vol
