# Full Ornith-lite pipeline stage order and Modal commands.
#
# Stage 0: Download instruct model (once)
#   modal run train/modal_app.py --download-only
#
# Stage 1: SFT agent + tools
#   modal run --detach train/modal_app.py --stage sft --config sft_agent.yaml
#
# Stage 2: SFT coding (continues SFT-1 adapter)
#   modal run --detach train/modal_app.py --stage sft --config sft_code.yaml
#
# Stage 3: DPO preferences
#   modal run --detach train/modal_app.py --stage dpo --config dpo.yaml
#
# Stage 4: GRPO verifiable rewards
#   modal run --detach train/modal_app.py --stage grpo --config grpo.yaml
#
# Stage 5: Eval + export
#   modal run train/modal_app.py --stage eval --config eval_export.yaml
#   modal run train/modal_app.py --stage export --config eval_export.yaml
#
# Or run SFT→DPO→GRPO chain (14hr each — may need separate detached runs):
#   modal run --detach train/modal_app.py --stage full

model_id: LiquidAI/LFM2.5-8B-A1B

stages:
  - sft_agent.yaml
  - sft_code.yaml
  - dpo.yaml
  - grpo.yaml

modal:
  app_name: mars-lfm-train
  gpu: A10G
  timeout_hours: 14
  volume: mars-train-vol
